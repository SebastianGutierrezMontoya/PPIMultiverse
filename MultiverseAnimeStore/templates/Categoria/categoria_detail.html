{% extends "base.html" %}
{% block content %}
<div class="container">
<h2>{{ object.cat_nombre }}</h2>
<p>{{ object.cat_descripcion }}</p>
<div class="form-linear">
    <a class="btn-link" href="{% url 'categoria_update' object.pk %}">Editar</a>
    <a class="btn-link" href="{% url 'categoria_delete' object.pk %}">Eliminar</a>
    <a class="btn-link" href="{% url 'categoria_list' %}">Volver al listado</a>
</div>
</div>
{% endblock %}
