{% extends "base.html" %}
{% block content %}
<div class="container">
<h2>{{ object.est_nombre|default:object.est_id }}</h2>
<p>ID: {{ object.est_id }}</p>
<div class="form-linear">
    <a class="btn-link" href="{% url 'estado_pedidos_update' object.pk %}">Editar</a>
    <a class="btn-link" href="{% url 'estado_pedidos_delete' object.pk %}">Eliminar</a>
    <a class="btn-link" href="{% url 'estado_pedidos_list' %}">Volver al listado</a>
</div>
</div>
{% endblock %}
