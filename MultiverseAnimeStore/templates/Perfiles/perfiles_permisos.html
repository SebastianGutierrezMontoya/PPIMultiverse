{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <h2>Permisos del Perfil: {{ perfil.nombre }}</h2>
    <form method="post">
        {% csrf_token %}
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Módulo</th>
                    <th>Leer</th>
                    <th>Crear</th>
                    <th>Actualizar</th>
                    <th>Eliminar</th>
                </tr>
            </thead>
            <tbody>
                {% for modulo_nombre, permisos in permisos_asignados.items %}
                <tr>
                    <td>{{ modulo_nombre }}</td>
                    <td><input type="checkbox" name="perm_{{ modulo_nombre }}_read" {% if permisos.read %}checked{% endif %}></td>
                    <td><input type="checkbox" name="perm_{{ modulo_nombre }}_create" {% if permisos.create %}checked{% endif %}></td>
                    <td><input type="checkbox" name="perm_{{ modulo_nombre }}_update" {% if permisos.update %}checked{% endif %}></td>
                    <td><input type="checkbox" name="perm_{{ modulo_nombre }}_delete" {% if permisos.delete %}checked{% endif %}></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button type="submit" class="btn btn-primary">Guardar Permisos</button>
    </form>
</div>

{% endblock %}
