{% extends "base.html" %}
{% block content %}


<form method="post" class="form-container">
    <h2 class="form-header">{% if object %}Editar{% else %}Crear{% endif %} Producto</h2>
    {% csrf_token %}
    <!-- {{ form.as_p }} -->

    {% for field in form %}
        <div class="form-floating">
          {{ field }}
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        </div>
    {% endfor %}

    <div class="form-linear form-center">
        <button type="submit">Guardar</button>
        <a href="{% url 'productos_list' %}" class="btn-link">Volver al listado</a>
    </div>
</form>

{% endblock %}
