{% extends "base.html" %}
{% block content %}
<h2>Eliminar Pedido</h2>
<p>¿Estás seguro de que deseas eliminar el pedido "{{ object }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
    <a href="{% url 'pedidos_list' %}">Cancelar</a>
</form>
{% endblock %}
