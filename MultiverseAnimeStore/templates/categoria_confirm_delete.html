{% extends "base.html" %}
{% block content %}
<h2>Eliminar Categoría</h2>
<p>¿Estás seguro de que deseas eliminar "{{ object.cat_nombre }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
</form>
<a href="{% url 'categoria_list' %}">Cancelar</a>
{% endblock %}
