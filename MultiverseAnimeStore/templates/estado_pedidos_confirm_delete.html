{% extends "base.html" %}
{% block content %}
<h2>Eliminar Estado de Pedido</h2>
<p>¿Estás seguro de que deseas eliminar "{{ object.ets_nombre|default:object.est_id }}"?</p>
<form method="post">
  {% csrf_token %}
  <button type="submit">Sí, eliminar</button>
  <a href="{% url 'estado_pedidos_list' %}">Cancelar</a>
</form>
{% endblock %}
