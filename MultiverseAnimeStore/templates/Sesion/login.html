{% extends "base.html" %}
{% block content %}

<div class="form-container">
    <h2 class="form-header">Registrar Usuario</h2>
    <form method="post">
        {% csrf_token %}
        
        {% if form.errors %}
        <div class="error-container">
            {% for field in form %}
                {% for error in field.errors %}
                    <div class="error-item">{{ error }}</div>
                {% endfor %}
            {% endfor %}
        {% endif %}

        <div class="form-floating">
          <input type="text" name="usuario" value="" maxlength="50" class="form-control" placeholder=" " required="" id="id_id_usuario">
          <label for="id_id_usuario">Nombre de Usuario</label>
        </div>


        <div class="form-floating">
          <input type="password" name="contraseña" maxlength="255" class="form-control" placeholder=" " id="id_password_hash">
          <label for="id_password_hash">Contraseña</label>
        </div>
        

        <button type="submit" class="btn btn-primary">Entrar</button>
    </form>


</div>

{% endblock %}
