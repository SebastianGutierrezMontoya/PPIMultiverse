{% extends "base.html" %}
{% block content %}
<div class="container">
<h2>{{ object.nombre_sexo }}</h2>
<p>ID: {{ object.id_sexo }}</p>
<div class="form-linear">
    <a class="btn-link" href="{% url 'sexos_update' object.pk %}">Editar</a>
    <a class="btn-link" href="{% url 'sexos_delete' object.pk %}">Eliminar</a>
    <a class="btn-link" href="{% url 'sexos_list' %}">Volver al listado</a>
</div>
</div>
{% endblock %}
