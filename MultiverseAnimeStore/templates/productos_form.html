{% extends "base.html" %}
{% block content %}


<form method="post">
    <h2 class="form-header">{% if object %}Editar{% else %}Crear{% endif %} Producto</h2>
    {% csrf_token %}
    {{ form.as_p }}

    <div class="form-linear form-center">
        <button type="submit">Guardar</button>
        <a href="{% url 'productos_list' %}" class="btn-link">Volver al listado</a>
    </div>
</form>

{% endblock %}
