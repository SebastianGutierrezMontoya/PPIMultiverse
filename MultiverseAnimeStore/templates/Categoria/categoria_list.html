{% extends "base.html" %}
{% block content %}
<div class="container">
<h2>Categorías</h2>
<a href="{% url 'categoria_create' %}" class="btn-link">Crear nueva categoría</a>
<ul>
    {% for categoria in object_list %}
        <li>
            <a href="{% url 'categoria_detail' categoria.pk %}" class="btn-link2">{{ categoria.cat_nombre }}</a>
            (<a href="{% url 'categoria_update' categoria.pk %}" class="btn-link">Editar</a>,
             <a href="#" onclick="showDeleteModal('{{ categoria.pk }}', '{{ categoria.cat_nombre }}'); return false;" class="btn-link">Eliminar</a>)
        </li>
    {% endfor %}
</ul>
</div>
<!-- Modal de confirmación de borrado -->
<div id="deleteModal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.4); z-index:2000;">
    <div style="background:#fff; padding:30px; max-width:400px; margin:100px auto; border-radius:8px; position:relative;">
        <h3>Eliminar Categoría</h3>
        <p id="deleteMessage"></p>
        <form id="deleteForm" method="post" style="display:inline;">
            {% csrf_token %}
            <div class="form-linear form-center">
                <button type="submit">Sí, eliminar</button>
                <button type="button" onclick="hideDeleteModal()">Cancelar</button>
            </div>
        </form>
    </div>
</div>
<script>
    function showDeleteModal(pk, nombre) {
        document.getElementById('deleteMessage').textContent = '¿Estás seguro de que deseas eliminar "' + nombre + '"?';
        var form = document.getElementById('deleteForm');
        form.action = '/categorias/' + pk + '/eliminar/';
        document.getElementById('deleteModal').style.display = 'block';
    }
    function hideDeleteModal() {
        document.getElementById('deleteModal').style.display = 'none';
    }
</script>
{% endblock %}
